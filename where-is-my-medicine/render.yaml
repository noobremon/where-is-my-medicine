services:
  # Admin Panel (Vite + React)
  - type: web
    name: wimm-admin
    runtime: static
    buildCommand: cd where-is-my-medicine && npm install && npm run build:admin
    staticPublishPath: where-is-my-medicine/apps/admin/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20

  # Customer App (Expo Web)
  - type: web
    name: wimm-customer
    runtime: static
    buildCommand: cd where-is-my-medicine && npm install && npm run build:customer
    staticPublishPath: where-is-my-medicine/apps/customer/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20

  # Pharmacy App (Expo Web)
  - type: web
    name: wimm-pharmacy
    runtime: static
    buildCommand: cd where-is-my-medicine && npm install && npm run build:pharmacy
    staticPublishPath: where-is-my-medicine/apps/pharmacy/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
